name: ML Auto-Grading

on: [push]  # 학생이 코드를 밀어 넣을(push) 때마다 채점 시작

jobs:
  grading:
    runs-on: ubuntu-latest
    steps:
    - name: Check out student repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy==1.26.4 pytest==8.0.0 pytest-timeout==2.2.0

    - name: Run PyTest
      run: |
        pytest --tb=short --timeout=15
